[pytest]
testpaths = weebot/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async — auto-detect so new tests don't need @pytest.mark.asyncio
asyncio_mode = auto
# Session-scoped loop prevents module-level asyncio.Lock() from hanging
# across per-function event loops (connection_pool._pool_lock)
asyncio_default_fixture_loop_scope = session

# Per-test timeout to catch hangs (requires pytest-timeout)
timeout = 60

# Coverage
addopts =
    --tb=short
    --strict-markers
    -ra

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Coverage config (when run with --cov)
[coverage:run]
source = weebot
omit =
    weebot/tests/*
    weebot/GitNexus-main/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
