<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <!-- Warm gradient overlay -->
    <linearGradient id="warmOverlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#16213e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0f3460" stop-opacity="0.6"/>
    </linearGradient>
    
    <!-- Gold accent gradient -->
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    
    <!-- Warm light glow -->
    <radialGradient id="warmGlow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5e6c8" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Soft vignette -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="transparent" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0.6"/>
    </radialGradient>
    
    <!-- Architectural line pattern -->
    <pattern id="archPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M10 110 Q60 20 110 110" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.15"/>
    </pattern>
    
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
    
    <!-- Soft blur for depth -->
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base background - deep navy/slate -->
  <rect width="1920" height="1080" fill="#0d1b2a"/>
  
  <!-- Warm ambient glow from top-center (simulating interior lighting) -->
  <rect width="1920" height="1080" fill="url(#warmGlow)"/>
  
  <!-- Architectural geometric elements - modern clinic facade suggestion -->
  <!-- Left vertical accent -->
  <rect x="80" y="100" width="4" height="880" fill="url(#goldAccent)" opacity="0.4"/>
  
  <!-- Right vertical accent -->
  <rect x="1836" y="100" width="4" height="880" fill="url(#goldAccent)" opacity="0.4"/>
  
  <!-- Top horizontal line -->
  <rect x="80" y="100" width="1760" height="1" fill="url(#goldAccent)" opacity="0.3"/>
  
  <!-- Bottom horizontal line -->
  <rect x="80" y="980" width="1760" height="1" fill="url(#goldAccent)" opacity="0.3"/>
  
  <!-- Central architectural frame - suggesting a modern building entrance -->
  <rect x="560" y="180" width="800" height="720" rx="2" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Inner frame -->
  <rect x="600" y="220" width="720" height="640" rx="1" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Arch motif - classical meets modern -->
  <path d="M760 700 Q960 400 1160 700" stroke="#c9a96e" stroke-width="1.5" fill="none" opacity="0.25" filter="url(#glow)"/>
  <path d="M800 700 Q960 440 1120 700" stroke="#c9a96e" stroke-width="0.8" fill="none" opacity="0.15"/>
  
  <!-- Warm light beams from top -->
  <polygon points="960,0 860,500 1060,500" fill="#f5e6c8" opacity="0.03"/>
  <polygon points="960,0 780,600 1140,600" fill="#f5e6c8" opacity="0.02"/>
  
  <!-- Decorative circles - suggesting medical precision -->
  <circle cx="960" cy="480" r="180" stroke="#c9a96e" stroke-width="0.5" fill="none" opacity="0.1"/>
  <circle cx="960" cy="480" r="220" stroke="#c9a96e" stroke-width="0.3" fill="none" opacity="0.08"/>
  <circle cx="960" cy="480" r="260" stroke="#c9a96e" stroke-width="0.3" fill="none" opacity="0.05"/>
  
  <!-- Small decorative dots at intersections -->
  <circle cx="560" cy="180" r="3" fill="#c9a96e" opacity="0.5"/>
  <circle cx="1360" cy="180" r="3" fill="#c9a96e" opacity="0.5"/>
  <circle cx="560" cy="900" r="3" fill="#c9a96e" opacity="0.5"/>
  <circle cx="1360" cy="900" r="3" fill="#c9a96e" opacity="0.5"/>
  
  <!-- Horizontal accent lines -->
  <rect x="200" y="540" width="280" height="1" fill="url(#goldAccent)" opacity="0.2"/>
  <rect x="1440" y="540" width="280" height="1" fill="url(#goldAccent)" opacity="0.2"/>
  
  <!-- Subtle grid pattern in background -->
  <rect width="1920" height="1080" fill="url(#archPattern)" opacity="0.5"/>
  
  <!-- Warm ambient light spots -->
  <circle cx="400" cy="300" r="150" fill="#e8a87c" opacity="0.04" filter="url(#softBlur)"/>
  <circle cx="1520" cy="350" r="120" fill="#e8a87c" opacity="0.03" filter="url(#softBlur)"/>
  <circle cx="960" cy="200" r="200" fill="#f5e6c8" opacity="0.05" filter="url(#softBlur)"/>
  
  <!-- Vignette overlay -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
  
  <!-- Bottom gradient fade for text readability -->
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="transparent" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.7"/>
  </linearGradient>
  <rect x="0" y="700" width="1920" height="380" fill="url(#bottomFade)"/>
  
  <!-- Top gradient fade -->
  <linearGradient id="topFade" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="transparent" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0.5"/>
  </linearGradient>
  <rect x="0" y="0" width="1920" height="200" fill="url(#topFade)"/>
  
  <!-- Decorative corner flourishes -->
  <!-- Top-left -->
  <path d="M80 120 L80 80 L120 80" stroke="#c9a96e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Top-right -->
  <path d="M1840 120 L1840 80 L1800 80" stroke="#c9a96e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Bottom-left -->
  <path d="M80 960 L80 1000 L120 1000" stroke="#c9a96e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Bottom-right -->
  <path d="M1840 960 L1840 1000 L1800 1000" stroke="#c9a96e" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- Subtle star/sparkle accents -->
  <circle cx="300" cy="250" r="1.5" fill="#f5e6c8" opacity="0.3"/>
  <circle cx="1620" cy="280" r="1.5" fill="#f5e6c8" opacity="0.3"/>
  <circle cx="500" cy="750" r="1" fill="#f5e6c8" opacity="0.2"/>
  <circle cx="1420" cy="780" r="1" fill="#f5e6c8" opacity="0.2"/>
  <circle cx="960" cy="150" r="2" fill="#f5e6c8" opacity="0.25"/>
  
  <!-- Thin decorative line near bottom -->
  <rect x="710" y="920" width="500" height="0.5" fill="url(#goldAccent)" opacity="0.3"/>
</svg>