version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - WEEBOT_WORKSPACE=/workspace
      - WEEBOT_SKILLOPT=0
    volumes:
      - ./weebot_sessions.db:/app/weebot_sessions.db
      - ./projects.db:/app/projects.db
      - ~/.weebot:/root/.weebot
      - workspace:/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  workspace:
