# Weebot — Docker Compose
# 3 services: API (FastAPI + MCP), UI (Next.js), Scheduler (cron jobs)
# Run: docker compose up -d
# Stop: docker compose down
#
# ── Passing API keys ────────────────────────────────────────────────
# Option A (CI/remote): export in shell before docker compose
#   export OPENROUTER_API_KEY=sk-or-...
#   docker compose up -d
#
# Option B (local): create .env and use --env-file
#   cp .env.example .env   # fill in keys
#   docker compose --env-file .env up -d

services:
  # ── API — FastAPI HTTP + MCP server ───────────────────────────────
  weebot-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"   # FastAPI
      - "5050:5050"   # MCP server
    environment:
      - WEEBOT_WORKSPACE=/data
      - WEEBOT_LOGS_DIR=/data/logs
      - WEEBOT_SESSIONS_DB=/data/weebot_sessions.db
      - WEEBOT_MEMORY_DIR=/data/memory
      - WEEBOT_PROFILES_DIR=/data/profiles
      - BASH_TIMEOUT=${BASH_TIMEOUT:-30}
      - SANDBOX_MAX_OUTPUT_BYTES=${SANDBOX_MAX_OUTPUT_BYTES:-65536}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - BROWSER_HEADLESS=true
    volumes:
      - weebot_data:/data
      - ./Output:/data/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import weebot; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── UI — Next.js frontend ─────────────────────────────────────────
  weebot-ui:
    build:
      context: .
      dockerfile: weebot-ui/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://weebot-api:8000
    depends_on:
      weebot-api:
        condition: service_healthy
    restart: unless-stopped

  # ── Scheduler — cron job runner ───────────────────────────────────
  weebot-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-m", "weebot.scheduling.default_jobs"]
    environment:
      - WEEBOT_WORKSPACE=/data
      - WEEBOT_LOGS_DIR=/data/logs
      - WEEBOT_SESSIONS_DB=/data/weebot_sessions.db
      - WEEBOT_MEMORY_DIR=/data/memory
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - weebot_data:/data
      - ./Output:/data/output
    depends_on:
      weebot-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  weebot_data:
