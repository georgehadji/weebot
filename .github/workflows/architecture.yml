name: Architecture Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  architecture-fitness:
    name: Architecture Fitness Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install import-linter
      - name: Run import-linter
        run: make lint-imports
      - name: Run architecture fitness tests
        run: pytest tests/unit/test_architecture_fitness.py -v --tb=short
      - name: Run check-arch (all architecture gates)
        run: make check-arch
      - name: Run event bridge contract tests
        run: pytest tests/integration/test_event_bridge_contract.py -v --tb=short
      - name: Run security penetration tests
        run: pytest tests/integration/test_security_penetration.py -v --tb=short

  persistence:
    name: Persistence Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run persistence tests
        run: pytest tests/e2e/test_persistence.py -v --tb=short

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short -x --cov=weebot --cov-report=term --cov-fail-under=48

  docker-smoke:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: architecture-fitness
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build weebot-api image
        run: docker build -t weebot-api .
      - name: Build weebot-ui image
        run: docker build -t weebot-ui -f weebot-ui/Dockerfile .
      - name: Start services (no .env — verify crash-free)
        run: |
          export OPENROUTER_API_KEY=ci-test-key
          export ANTHROPIC_API_KEY=ci-test-key
          docker compose -f docker-compose.yml up -d --wait || true
      - name: Verify API health
        run: |
          for i in $(seq 1 10); do
            curl -s http://localhost:8000/health && break
            sleep 2
          done
      - name: Check services running
        run: docker compose ps
      - name: Tear down
        if: always()
        run: docker compose down -v
